# Node.js React App CI/CD Pipeline for Azure Web App

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  azureSubscription: 'Azure subscription 1'
  appServiceName: 'FocusTime'
  buildArtifactName: 'drop'

steps:
# Step 1: Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'  # Using LTS version
  displayName: 'Install Node.js'

# Step 2: Install dependencies and build
- script: |
    npm install --legacy-peer-deps
    npm run build
  displayName: 'npm install and build'

# Step 3: Create deployment package (for Web App)
- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: 'dist'  # Vite outputs to 'dist'. Use 'build' for Create React App
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
    replaceExistingArchive: true
  displayName: 'Create deployment package'

# Step 4: Publish artifact to Azure DevOps
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: '$(buildArtifactName)'
  displayName: 'Publish artifact'

# Step 5: Deploy to Azure Web App
- task: AzureWebApp@1
  inputs:
    azureSubscription: '$(azureSubscription)'
    appType: 'webAppLinux'
    appName: '$(appServiceName)'
    package: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
    runtimeStack: 'NODE|18-lts'
    startUpCommand: 'npx serve -s dist'
  displayName: 'Deploy to Azure Web App'