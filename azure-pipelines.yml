name: Deploy React App to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: FocusTime-App
  AZURE_WEBAPP_PACKAGE_PATH: './build'
  NODE_VERSION: '18.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4
    
    - name: 'Setup Node.js ${{ env.NODE_VERSION }}'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: 'Install Dependencies'
      run: |
        npm ci --legacy-peer-deps || npm install --legacy-peer-deps
    
    - name: 'Build React App'
      run: |
        npm run build
        # Create staticwebapp.config.json for SPA routing
        echo '{"navigationFallback":{"rewrite":"/index.html","exclude":["/images/*","/css/*","/js/*","/*.js","/*.map","/static/*"]}}' > build/staticwebapp.config.json
    
    - name: 'List build folder contents'
      run: ls -la build/
    
    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
