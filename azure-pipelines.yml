# Azure DevOps CI/CD Pipeline for React App (Static Web App)

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: static-web-app-variables

stages:
# --- STAGE 1: CONTINUOUS INTEGRATION (CI) ---
- stage: CI_Build
  displayName: 'CI: Build Application'
  jobs:
  - job: RunNpmBuild
    displayName: 'Compile React Project'
    steps:
    # Install Node.js (updated to 20.x for compatibility)
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    # Clean install and build
    - script: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps
        npm run build
      displayName: 'npm install and build'

    # Publish the build artifact
    - task: PublishPipelineArtifact@1
      displayName: 'Save Built Files'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/dist'
        artifact: 'build_output'

# --- STAGE 2: CONTINUOUS DELIVERY (CD) ---
- stage: CD_Deploy
  displayName: 'CD: Deploy to Azure Static Web App'
  dependsOn: CI_Build
  condition: succeeded()
  jobs:
  - job: ExecuteDeploy
    displayName: 'Push to Azure Static Web App'
    steps:
    # Download the built artifact
    - task: DownloadPipelineArtifact@2
      displayName: 'Retrieve Built Files'
      inputs:
        buildType: 'current'
        artifactName: 'build_output'
        targetPath: '$(Pipeline.Workspace)/drop'

    # Deploy to Azure Static Web App
- task: AzureStaticWebApp@0
  displayName: 'Deploy to Azure Static Web App'
  inputs:
    azureSubscription: 'azure-service-connection'
    appLocation: '$(Pipeline.Workspace)/drop'
    apiLocation: ''
    outputLocation: ''
    azureStaticWebAppsApiToken: '2aa4272245548c5c38cd014c179be70086898eb79ca1315c7cc08d2e8af2b2a807-035e8e69-b8d8-4ec8-bc13-6515fc30301700f04190ab308d0f'
