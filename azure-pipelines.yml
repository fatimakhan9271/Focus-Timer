# Azure DevOps CI/CD Pipeline for React App (Focus Timer)

trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
# --- STAGE 1: CONTINUOUS INTEGRATION (CI) ---
- stage: CI_Build
  displayName: 'CI: Build Application'
  jobs:
  - job: RunNpmBuild
    displayName: 'Compile React Project'
    steps:
    # Install Node.js
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    # Inject environment variables and build
    - script: |
        npm install --legacy-peer-deps
        npm run build
      displayName: 'npm install and build'
      env:
        # Add your environment variables here if needed
        VITE_API_BASE_URL: 'https://your-api-url.com'  # Optional
        VITE_AUTH0_DOMAIN: 'your-auth0-domain'         # Optional

    # Inject Express into the build artifact directory for server routing (if needed)
    - script: |
        cp -r dist dist_backup || true
        mkdir -p dist_backup
        cp -r dist/* dist_backup/ || true
        echo "Build completed successfully"
      displayName: 'Prepare Production Web Server Environment'

    # Publish the build artifact
    - task: PublishPipelineArtifact@1
      displayName: 'Save Built Files'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/dist'
        artifact: 'build_output'

# --- STAGE 2: CONTINUOUS DELIVERY (CD) ---
- stage: CD_Deploy
  displayName: 'CD: Deploy to Azure'
  dependsOn: CI_Build
  condition: succeeded()
  jobs:
  - job: ExecuteDeploy
    displayName: 'Push to Azure Web App'
    steps:
    # Download the built artifact
    - task: DownloadPipelineArtifact@2
      displayName: 'Retrieve Built Files'
      inputs:
        buildType: 'current'
        artifactName: 'build_output'
        targetPath: '$(Pipeline.Workspace)/drop'

    # Deploy to Azure Web App
    - task: AzureRmWebAppDeployment@4
      displayName: 'Deploy to Azure Web App'
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: 'azure-service-connection'  # Your service connection name
        appType: 'webAppLinux'
        WebAppName: 'FocusTime'                        # Your Web App name
        Package: '$(Pipeline.Workspace)/drop'
        RuntimeStack: 'NODE|18-lts'
        StartupCommand: 'npx serve -s .'
