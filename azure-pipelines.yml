# Azure DevOps CI/CD Pipeline for React App (Static Web App)

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: static-web-app-variables  # ← This links to the secure variable group

stages:
# --- STAGE 1: CONTINUOUS INTEGRATION (CI) ---
- stage: CI_Build
  displayName: 'CI: Build Application'
  jobs:
  - job: RunNpmBuild
    displayName: 'Compile React Project'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps
        npm run build
      displayName: 'npm install and build'

    - task: PublishPipelineArtifact@1
      displayName: 'Save Built Files'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/dist'
        artifact: 'build_output'

# --- STAGE 2: CONTINUOUS DELIVERY (CD) ---
- stage: CD_Deploy
  displayName: 'CD: Deploy to Azure Static Web App'
  dependsOn: CI_Build
  condition: succeeded()
  jobs:
  - job: ExecuteDeploy
    displayName: 'Push to Azure Static Web App'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Retrieve Built Files'
      inputs:
        buildType: 'current'
        artifactName: 'build_output'
        targetPath: '$(Pipeline.Workspace)/drop'

    # Deploy using Azure CLI with secure token
- script: |
    az extension add --name staticwebapp --yes
    az staticwebapp appsettings set \
      --name "FocusTime" \
      --resource-group "DefaultResourceGroup-CCAN" \
      --setting-name "DEPLOYMENT_TOKEN" \
      --value "$(DEPLOYMENT_TOKEN)"
    az staticwebapp deployment \
      --name "FocusTime" \
      --resource-group "DefaultResourceGroup-CCAN" \
      --source "$(Pipeline.Workspace)/drop" \
      --branch "main"
  displayName: 'Deploy to Azure Static Web App'
