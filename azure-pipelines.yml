# Azure DevOps CI/CD Pipeline for React App (Static Web App)

trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
# --- STAGE 1: CONTINUOUS INTEGRATION (CI) ---
- stage: CI_Build
  displayName: 'CI: Build Application'
  jobs:
  - job: RunNpmBuild
    displayName: 'Compile React Project'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps
        npm run build
      displayName: 'npm install and build'

    - task: PublishPipelineArtifact@1
      displayName: 'Save Built Files'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/dist'
        artifact: 'build_output'

# --- STAGE 2: CONTINUOUS DELIVERY (CD) ---
- stage: CD_Deploy
  displayName: 'CD: Deploy to Azure Static Web App'
  dependsOn: CI_Build
  condition: succeeded()
  jobs:
  - job: ExecuteDeploy
    displayName: 'Push to Azure Static Web App'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Retrieve Built Files'
      inputs:
        buildType: 'current'
        artifactName: 'build_output'
        targetPath: '$(Pipeline.Workspace)/drop'

    # Deploy using Azure CLI instead of the Static Web App task
    - script: |
        az login --service-principal -u $(AZURE_CLIENT_ID) -p $(AZURE_CLIENT_SECRET) --tenant $(AZURE_TENANT_ID)
        az extension add --name staticwebapp
        az staticwebapp deploy \
          --name "FocusTime" \
          --resource-group "DefaultResourceGroup-CCAN" \
          --source "https://github.com/fatimakhan9271/Focus-Timer" \
          --branch "main" \
          --token "2aa4272245548c5c38cd014c179be70086898eb79ca1315c7cc08d2e8af2b2a807-035e8e69-b8d8-4ec8-bc13-6515fc30301700f04190ab308d0f"
      displayName: 'Deploy to Azure Static Web App'
      env:
        AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
        AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
        AZURE_TENANT_ID: $(AZURE_TENANT_ID)
