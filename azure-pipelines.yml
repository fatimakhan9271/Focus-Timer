trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: static-web-app-variables

stages:
- stage: CI_Build
  displayName: 'CI: Build Application'
  jobs:
  - job: RunNpmBuild
    displayName: 'Compile React Project'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps
        npm run build
      displayName: 'npm install and build'

    - task: PublishPipelineArtifact@1
      displayName: 'Save Built Files'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/dist'
        artifact: 'build_output'

- stage: CD_Deploy
  displayName: 'CD: Deploy to Azure Static Web App'
  dependsOn: CI_Build
  condition: succeeded()
  jobs:
  - job: ExecuteDeploy
    displayName: 'Push to Azure Static Web App'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Retrieve Built Files'
      inputs:
        buildType: 'current'
        artifactName: 'build_output'
        targetPath: '$(Pipeline.Workspace)/drop'

    # 🔑 THIS IS THE CORRECT REST API DEPLOYMENT
    - script: |
        DEPLOYMENT_TOKEN="$(DEPLOYMENT_TOKEN)"
        echo "📦 Triggering deployment via REST API..."
        curl -X POST \
          -H "Authorization: Bearer $DEPLOYMENT_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"repository": "https://github.com/fatimakhan9271/Focus-Timer", "branch": "main"}' \
          https://green-stone-0ab308d0f.7.azurestaticapps.net
        echo "✅ Deployment request sent!"
      displayName: 'Deploy to Azure Static Web App'
